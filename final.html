<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Nosso encontro ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e6e6fa,#ff69b4);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.heart{
    position:fixed;
    font-size:140px;
    opacity:0.25;
    animation:pulsar 2s infinite;
}

.canto1{top:-30px;left:-30px;}
.canto2{top:-30px;right:-30px;}
.canto3{bottom:-30px;left:-30px;}
.canto4{bottom:-30px;right:-30px;}

.container{
    text-align:center;
    padding:20px;
    max-width:500px;
}

h1{
    color:#ff1493;
    font-size:40px;
}

p{
    color:#8b008b;
    font-size:22px;
    line-height:1.5;
}

button{
    margin-top:25px;
    width:220px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff69b4;
    color:white;
    font-size:18px;
}


@keyframes pulsar{
    50%{
        transform:scale(1.1);
    }
}

</style>

</head>

<body>

<div class="heart canto1">❤️</div>
<div class="heart canto2">❤️</div>
<div class="heart canto3">❤️</div>
<div class="heart canto4">❤️</div>


<div class="container">

<h1>❤️ Está tudo pronto! ❤️</h1>

<p>
Agora temos o lugar, o dia e o horário. 🥰
<br><br>
Obrigado por aceitar esse convite.
<br><br>
Mal posso esperar para viver esse momento especial com você.
❤️
</p>


<button onclick="window.location.href='index.html'">
Voltar ao começo ❤️
</button>


</div>

<script src="efeitos.js"></script>

</body>

</html>
